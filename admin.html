<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin — Cadastros</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">

  <header class="admin-header">
    <div class="header-left">
      <div class="header-logo"><i class="ti ti-database"></i></div>
      <div>
        <h1 class="header-title">Painel de Cadastros</h1>
        <p class="header-sub">Gerenciamento de leads via QR Code</p>
      </div>
    </div>
    <div class="header-right">
      <span class="realtime-badge" id="realtime-badge">
        <span class="dot"></span> Ao vivo
      </span>
      <button class="btn-icon" onclick="carregarCadastros()" title="Atualizar">
        <i class="ti ti-refresh" id="icon-refresh"></i>
      </button>
      <button class="btn-icon btn-danger-soft" onclick="sair()" title="Sair">
        <i class="ti ti-logout"></i>
      </button>
    </div>
  </header>

  <main class="admin-main">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon green"><i class="ti ti-users"></i></div>
        <div>
          <p class="stat-label">Total de cadastros</p>
          <p class="stat-value" id="total-cadastros">—</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue"><i class="ti ti-calendar-plus"></i></div>
        <div>
          <p class="stat-label">Hoje</p>
          <p class="stat-value" id="total-hoje">—</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple"><i class="ti ti-calendar-week"></i></div>
        <div>
          <p class="stat-label">Essa semana</p>
          <p class="stat-value" id="total-semana">—</p>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-search">
        <div class="search-field">
          <i class="ti ti-search"></i>
          <input type="text" id="busca-nome" placeholder="Buscar por nome..." oninput="filtrar()" />
        </div>
        <div class="search-field">
          <i class="ti ti-id-badge"></i>
          <input type="text" id="busca-cpf" placeholder="Buscar por CPF..." oninput="filtrar()" maxlength="14" />
        </div>
      </div>
      <div class="toolbar-actions">
        <button class="btn-secondary" onclick="exportarCSV()">
          <i class="ti ti-table-export"></i> Exportar CSV
        </button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table class="data-table" id="tabela">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>CPF</th>
              <th>Nascimento</th>
              <th>Telefone</th>
              <th>Cadastrado em</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabela-body"></tbody>
        </table>
      </div>

      <div class="empty-state" id="empty-state" style="display:none;">
        <i class="ti ti-inbox"></i>
        <p>Nenhum cadastro encontrado</p>
        <span>Tente ajustar os filtros ou aguarde novos cadastros.</span>
      </div>

      <div class="loading-state" id="loading-state">
        <i class="ti ti-loader-2 spin"></i>
        <p>Carregando cadastros...</p>
      </div>

      <div class="pagination" id="paginacao" style="display:none;">
        <button class="btn-page" id="btn-prev" onclick="mudarPagina(-1)">
          <i class="ti ti-chevron-left"></i> Anterior
        </button>
        <span class="page-info" id="page-info"></span>
        <button class="btn-page" id="btn-next" onclick="mudarPagina(1)">
          Próxima <i class="ti ti-chevron-right"></i>
        </button>
      </div>
    </div>

  </main>

  <div class="modal-overlay" id="modal" onclick="fecharModal(event)">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title"><i class="ti ti-user-circle"></i> Detalhes do Cadastro</h2>
        <button class="modal-close" onclick="fecharModalBtn()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- SDK Supabase (apenas uma vez) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
