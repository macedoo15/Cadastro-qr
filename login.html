<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso Administrativo | Bem Brasil</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root {
      --bg: #0d5a22; --surface: rgba(21,94,38,0.92);
      --text: #f7f1d7; --muted: #bbd09b;
      --line: rgba(201,160,54,0.26);
      --accent: #d8ac32; --accent-2: #f1cf63;
      --danger: #ff806f;
      --shadow: 0 24px 60px rgba(3,30,8,0.36);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(212,171,54,0.15), transparent 18%),
        linear-gradient(180deg, #0a4d1c 0%, var(--bg) 36%, #084017 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem 1rem;
    }
    .wrap { max-width: 400px; width: 100%; }

    .logo-area { text-align: center; margin-bottom: 1.75rem; }
    .brand-mark { width: 72px; height: 72px; margin: 0 auto 0.8rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .brand-mark img { width: 100%; height: 100%; object-fit: contain; }
    .brand-mark span { font-family: 'Playfair Display', serif; font-size: 1.9rem; font-weight: 700; color: var(--accent); }
    .brand-kicker { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.3rem; }
    .page-title { font-size: 1.6rem; font-family: 'Playfair Display', serif; font-weight: 700; color: var(--text); }
    .page-sub { font-size: 0.9rem; color: var(--muted); margin-top: 0.25rem; }

    .card { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--line); border-radius: 16px; padding: 1.5rem; box-shadow: var(--shadow); animation: fadeUp 0.7s ease both; }

    .field { margin-bottom: 1.1rem; }
    .field:last-of-type { margin-bottom: 0; }
    .field label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.76rem; color: var(--accent); font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .field input { width: 100%; padding: 0 14px; height: 44px; font-size: 1rem; background: #373132; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: #f5efe0; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .field input:focus { border-color: rgba(216,172,50,0.65); box-shadow: 0 0 0 3px rgba(216,172,50,0.14); }

    .btn-login { width: 100%; height: 48px; background: transparent; color: #fff; border: 1px solid var(--accent); border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.55rem; margin-top: 1.25rem; transition: filter 0.2s, transform 0.15s, opacity 0.2s; }
    .btn-login:hover { filter: brightness(1.08); transform: translateY(-1px); background: rgba(216,172,50,0.08); }
    .btn-login:active { transform: translateY(0) scale(0.99); }
    .btn-login:disabled { opacity: 0.45; cursor: not-allowed; filter: none; transform: none; }

    .alert-erro { background: rgba(255,140,120,0.1); border: 1px solid rgba(255,140,120,0.2); border-radius: 10px; padding: 10px 14px; font-size: 0.84rem; color: #ffd8d3; margin-top: 1rem; display: none; align-items: center; gap: 8px; }
    .alert-erro i { flex-shrink: 0; }

    .lock-banner { background: rgba(255,128,111,0.12); border: 1px solid rgba(255,128,111,0.28); border-radius: 10px; padding: 10px 14px; font-size: 0.84rem; color: #ffd8d3; margin-top: 1rem; display: none; align-items: center; gap: 8px; }
    .lock-banner.visible { display: flex; }

    .divider { border: none; border-top: 1px solid var(--line); margin: 1.25rem 0; }
    .back-link { display: flex; align-items: center; justify-content: center; gap: 0.4rem; font-size: 0.88rem; color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .back-link:hover { color: var(--accent-2); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="brand-mark">
      <img src="logo.png" alt="Bem Brasil"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
      <span style="display:none;">BB</span>
    </div>
    <p class="brand-kicker">Bem Brasil Restaurante</p>
    <p class="page-title">Painel Administrativo</p>
    <p class="page-sub">Acesso restrito a usuários autorizados.</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="adm-email"><i class="ti ti-mail"></i> E-mail</label>
      <input type="email" id="adm-email" placeholder="admin@bembrasil.com" autocomplete="username" />
    </div>
    <div class="field">
      <label for="adm-senha"><i class="ti ti-lock"></i> Senha</label>
      <input type="password" id="adm-senha" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <div class="lock-banner" id="lock-banner">
      <i class="ti ti-shield-lock"></i>
      <span>Muitas tentativas. Aguarde <b id="lock-cd">30</b>s antes de tentar novamente.</span>
    </div>

    <div class="alert-erro" id="alert-login">
      <i class="ti ti-alert-circle"></i>
      <span id="alert-login-msg">Credenciais inválidas.</span>
    </div>

    <button class="btn-login" id="btn-login" onclick="fazerLogin()">
      <i class="ti ti-login"></i> Entrar
    </button>

    <hr class="divider" />
    <a href="index.html" class="back-link"><i class="ti ti-arrow-left"></i> Voltar ao cadastro</a>
  </div>
</div>

<script>
  /* ── Configuração ── */
  const API_BASE    = 'https://backend-cadastro-two.vercel.app/api';
  const TOKEN_KEY   = 'admin-auth-token';

  /* ── Rate limiting (5 tentativas / 30s) ── */
  const RATE = { max: 5, blockMs: 30_000 };
  let tentativas = 0, bloqueadoAte = 0, cdInterval = null;
  const bloqueado = () => Date.now() < bloqueadoAte;

  function registrarFalha() {
    tentativas++;
    if (tentativas < RATE.max) return;
    bloqueadoAte = Date.now() + RATE.blockMs;
    const banner = document.getElementById('lock-banner');
    const cd     = document.getElementById('lock-cd');
    banner.classList.add('visible');
    document.getElementById('btn-login').disabled = true;
    let s = Math.ceil(RATE.blockMs / 1000);
    cd.textContent = s;
    clearInterval(cdInterval);
    cdInterval = setInterval(() => {
      s--;
      cd.textContent = s;
      if (s <= 0) {
        clearInterval(cdInterval);
        banner.classList.remove('visible');
        tentativas = 0; bloqueadoAte = 0;
        document.getElementById('btn-login').disabled = false;
      }
    }, 1000);
  }

  /* ── Token salvo ── */
  function tokenSalvo() {
    try {
      const p = JSON.parse(localStorage.getItem(TOKEN_KEY) || '{}');
      if (p.expires_at && p.expires_at < Math.floor(Date.now() / 1000)) {
        localStorage.removeItem(TOKEN_KEY); return '';
      }
      return p.access_token || '';
    } catch (_) { return ''; }
  }

  /* ── Redireciona se já logado ── */
  (async () => {
    const t = tokenSalvo();
    if (!t) return;
    try {
      const r = await fetch(`${API_BASE}/session`, { headers: { Authorization: `Bearer ${t}` } });
      if (r.ok) window.location.replace('admin.html');
    } catch (_) {}
  })();

  /* ── Login ── */
  async function fazerLogin() {
    if (bloqueado()) return;
    const alerta = document.getElementById('alert-login');
    alerta.style.display = 'none';

    const email = document.getElementById('adm-email').value.trim().toLowerCase();
    const senha = document.getElementById('adm-senha').value;

    if (!email || !senha) {
      document.getElementById('alert-login-msg').textContent = 'Preencha e-mail e senha.';
      alerta.style.display = 'flex';
      return;
    }

    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader-2 spin"></i> Verificando...';

    try {
      const res  = await fetch(`${API_BASE}/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, senha }),
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        registrarFalha();
        throw new Error(data.error || 'E-mail ou senha incorretos.');
      }

      /* Salva apenas o token — nenhuma chave do Supabase no frontend */
      localStorage.setItem(TOKEN_KEY, JSON.stringify({
        access_token:  data.access_token,
        refresh_token: data.refresh_token,
        expires_at:    data.expires_at,
      }));

      window.location.replace('admin.html');

    } catch (err) {
      document.getElementById('alert-login-msg').textContent = err.message;
      alerta.style.display = 'flex';
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-login"></i> Entrar';
    }
  }

  document.getElementById('adm-senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
  });
</script>
</body>
</html>
